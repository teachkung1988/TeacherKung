<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資優班甄選評分系統 (緊湊版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --vci-main: #2980b9; --vci-light: #aed6f1;
            --vsi-main: #27ae60; --vsi-light: #abebc6;
            --wmi-main: #d35400; --wmi-light: #edbb99;
            --bg-color: #f4f6f8; --text-color: #2c3e50;
        }
        body {
            font-family: "Microsoft JhengHei", "Segoe UI", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px; /* 螢幕版：極窄邊距 */
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 15px; /* 螢幕版：緊湊內距 */
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        
        /* 螢幕版 Header 緊湊化 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }
        h2 { margin: 0; font-size: 1.3rem; }
        
        .student-info { display: flex; gap: 8px; }
        .student-info input { padding: 6px; border: 1px solid #ddd; border-radius: 4px; width: 120px; }

        /* Tabs */
        .tabs { display: flex; gap: 4px; margin-bottom: 10px; }
        .tab-btn {
            flex: 1; padding: 10px 5px; border: none; cursor: pointer;
            font-size: 1rem; font-weight: bold; border-radius: 6px 6px 0 0;
            background: #e0e0e0; color: #7f8c8d; transition: all 0.2s;
        }
        .tab-btn.active-vci { background: var(--vci-main); color: white; }
        .tab-btn.active-vsi { background: var(--vsi-main); color: white; }
        .tab-btn.active-wmi { background: var(--wmi-main); color: white; }

        /* Panels */
        .panel { display: none; padding: 10px; border: 1px solid #ddd; border-top: none; border-radius: 0 0 6px 6px; }
        .panel.active { display: block; }

        /* Controls */
        .control-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px; padding: 5px 10px; background: #f1f2f6; border-radius: 4px;
        }
        .timer-display { font-family: monospace; font-size: 1.4rem; font-weight: bold; line-height: 1; }
        
        /* Legend */
        .legend { display: flex; gap: 10px; margin-bottom: 5px; font-size: 0.8rem; justify-content: flex-end; }
        .legend-item { display: flex; align-items: center; gap: 4px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid #ccc; }

        /* Grid */
        .score-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; margin-bottom: 10px; }
        @media (max-width: 600px) { .score-grid { grid-template-columns: repeat(5, 1fr); } }
        
        .q-btn {
            aspect-ratio: 1; border: 1px solid #ddd; background: white; border-radius: 3px;
            cursor: pointer; font-weight: bold; color: #999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 0.8rem; user-select: none;
        }
        .q-btn span { font-size: 1rem; display: block; line-height: 1; }
        .q-btn small { font-size: 0.6rem; font-weight: normal; }

        /* Colors */
        .vci-panel .q-btn[data-score="2"] { background: var(--vci-main); color: white; }
        .vci-panel .q-btn[data-score="1"] { background: var(--vci-light); color: #003366; }
        .vsi-panel .q-btn[data-score="2"] { background: var(--vsi-main); color: white; }
        .vsi-panel .q-btn[data-score="1"] { background: var(--vsi-light); color: #004d00; }
        .wmi-panel .q-btn[data-score="2"] { background: var(--wmi-main); color: white; }
        .wmi-panel .q-btn[data-score="1"] { background: var(--wmi-light); color: #662200; }

        .score-box { text-align: right; font-size: 1rem; font-weight: bold; margin-top: 5px; }
        .score-number { font-size: 1.4rem; color: #c0392b; margin-left: 5px; }
        
        .obs-area { width: 100%; height: 60px; margin-top: 10px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 0.9rem; }
        .action-btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; color: white; font-weight: bold; font-size: 0.9rem; }
        .btn-start { background: #34495e; }
        .btn-reset { background: #95a5a6; }
        .btn-save { background: #e74c3c; width: 100%; padding: 12px; margin-top: 15px; font-size: 1rem; }

        /* 隱藏 PDF 模板 */
        #pdf-template { display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>資優甄選評分</h2>
        <div class="student-info">
            <input type="text" id="studentName" placeholder="姓名">
            <input type="text" id="examId" placeholder="准考證號">
        </div>
    </header>

    <div class="tabs">
        <button class="tab-btn active-vci" onclick="openTab('vci')">VCI 語文</button>
        <button class="tab-btn" onclick="openTab('vsi')">VSI 空間</button>
        <button class="tab-btn" onclick="openTab('wmi')">WMI 記憶</button>
    </div>

    <div id="vci" class="panel vci-panel active">
        <div class="control-bar">
            <strong>VCI 語文理解</strong>
            <div>
                <span id="timer-vci" class="timer-display">00:00</span>
                <button class="action-btn btn-start" onclick="toggleTimer('vci')">Start</button>
                <button class="action-btn btn-reset" onclick="resetTimer('vci')">Reset</button>
            </div>
        </div>
        <div class="legend">
            <div class="legend-item"><div class="dot" style="background:var(--vci-main)"></div>2</div>
            <div class="legend-item"><div class="dot" style="background:var(--vci-light)"></div>1</div>
            <div class="legend-item"><div class="dot" style="background:white"></div>0</div>
        </div>
        <div class="score-grid" id="grid-vci"></div>
        <div class="score-box">得分：<span id="score-vci" class="score-number">0</span> / 80</div>
        <textarea id="obs-vci" class="obs-area" placeholder="VCI 觀察記錄..."></textarea>
    </div>

    <div id="vsi" class="panel vsi-panel">
        <div class="control-bar">
            <strong>VSI 視覺空間</strong>
            <div>
                <span id="timer-vsi" class="timer-display">00:00</span>
                <button class="action-btn btn-start" onclick="toggleTimer('vsi')">Start</button>
                <button class="action-btn btn-reset" onclick="resetTimer('vsi')">Reset</button>
            </div>
        </div>
        <div class="legend">
            <div class="legend-item"><div class="dot" style="background:var(--vsi-main)"></div>2</div>
            <div class="legend-item"><div class="dot" style="background:var(--vsi-light)"></div>1</div>
            <div class="legend-item"><div class="dot" style="background:white"></div>0</div>
        </div>
        <div class="score-grid" id="grid-vsi"></div>
        <div class="score-box">得分：<span id="score-vsi" class="score-number">0</span> / 80</div>
        <textarea id="obs-vsi" class="obs-area" placeholder="VSI 觀察記錄..."></textarea>
    </div>

    <div id="wmi" class="panel wmi-panel">
        <div class="control-bar">
            <strong>WMI 工作記憶</strong>
            <div>
                <span id="timer-wmi" class="timer-display">00:00</span>
                <button class="action-btn btn-start" onclick="toggleTimer('wmi')">Start</button>
                <button class="action-btn btn-reset" onclick="resetTimer('wmi')">Reset</button>
            </div>
        </div>
        <div class="legend">
            <div class="legend-item"><div class="dot" style="background:var(--wmi-main)"></div>2</div>
            <div class="legend-item"><div class="dot" style="background:var(--wmi-light)"></div>1</div>
            <div class="legend-item"><div class="dot" style="background:white"></div>0</div>
        </div>
        <div class="score-grid" id="grid-wmi"></div>
        <div class="score-box">得分：<span id="score-wmi" class="score-number">0</span> / 80</div>
        <textarea id="obs-wmi" class="obs-area" placeholder="WMI 觀察記錄..."></textarea>
    </div>

    <button class="action-btn btn-save" onclick="generatePDF()">匯出 PDF 報告</button>
</div>

<div id="pdf-template" style="padding: 0 40px 20px 40px; font-family: 'Microsoft JhengHei', sans-serif;">
    <h1 style="text-align: center; color: #333; margin-top: 0; padding-top: 10px; margin-bottom: 20px; font-size: 24px;">資優班甄選 - 綜合評分表</h1>
    
    <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 14px;">
        <tr>
            <td style="padding: 8px; border: 1px solid #333; background: #eee; width: 15%;"><strong>考生姓名</strong></td>
            <td style="padding: 8px; border: 1px solid #333;" id="pdf-name"></td>
            <td style="padding: 8px; border: 1px solid #333; background: #eee; width: 15%;"><strong>准考證號</strong></td>
            <td style="padding: 8px; border: 1px solid #333;" id="pdf-id"></td>
        </tr>
        <tr>
            <td style="padding: 8px; border: 1px solid #333; background: #eee;"><strong>施測日期</strong></td>
            <td style="padding: 8px; border: 1px solid #333;" colspan="3" id="pdf-date"></td>
        </tr>
    </table>

    <h3 style="border-bottom: 2px solid #333; padding-bottom: 5px; margin: 15px 0 10px 0; font-size: 16px;">得分彙整</h3>
    <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px; text-align: center; font-size: 14px;">
        <thead>
            <tr style="background: #f4f4f4;">
                <th style="padding: 8px; border: 1px solid #333;">指標項目</th>
                <th style="padding: 8px; border: 1px solid #333;">原始分數</th>
                <th style="padding: 8px; border: 1px solid #333;">滿分</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td style="padding: 8px; border: 1px solid #333; color: #2980b9; font-weight:bold;">VCI 語文理解</td>
                <td style="padding: 8px; border: 1px solid #333; font-size: 1.1em;" id="pdf-score-vci"></td>
                <td style="padding: 8px; border: 1px solid #333;">80</td>
            </tr>
            <tr>
                <td style="padding: 8px; border: 1px solid #333; color: #27ae60; font-weight:bold;">VSI 視覺空間</td>
                <td style="padding: 8px; border: 1px solid #333; font-size: 1.1em;" id="pdf-score-vsi"></td>
                <td style="padding: 8px; border: 1px solid #333;">80</td>
            </tr>
            <tr>
                <td style="padding: 8px; border: 1px solid #333; color: #d35400; font-weight:bold;">WMI 工作記憶</td>
                <td style="padding: 8px; border: 1px solid #333; font-size: 1.1em;" id="pdf-score-wmi"></td>
                <td style="padding: 8px; border: 1px solid #333;">80</td>
            </tr>
        </tbody>
    </table>

    <h3 style="border-bottom: 2px solid #333; padding-bottom: 5px; margin: 15px 0 10px 0; font-size: 16px;">質性觀察 (Observations)</h3>
    <div style="font-size: 14px;">
        <div style="margin-bottom: 10px;">
            <strong style="color: #2980b9;">[VCI]：</strong>
            <p id="pdf-obs-vci" style="border-bottom: 1px solid #eee; padding: 5px; margin: 0; min-height: 20px;"></p>
        </div>
        <div style="margin-bottom: 10px;">
            <strong style="color: #27ae60;">[VSI]：</strong>
            <p id="pdf-obs-vsi" style="border-bottom: 1px solid #eee; padding: 5px; margin: 0; min-height: 20px;"></p>
        </div>
        <div style="margin-bottom: 10px;">
            <strong style="color: #d35400;">[WMI]：</strong>
            <p id="pdf-obs-wmi" style="border-bottom: 1px solid #eee; padding: 5px; margin: 0; min-height: 20px;"></p>
        </div>
    </div>

    <div style="margin-top: 40px; text-align: right; font-size: 14px;">
        <p>面試官簽名：________________________</p>
    </div>
</div>

<script>
    const categories = ['vci', 'vsi', 'wmi'];
    
    // 初始化按鈕
    categories.forEach(cat => {
        const grid = document.getElementById(`grid-${cat}`);
        for (let i = 1; i <= 40; i++) {
            const btn = document.createElement('div');
            btn.className = 'q-btn';
            btn.setAttribute('data-score', '0'); 
            btn.innerHTML = `<span>${i}</span><small>0</small>`;
            btn.onclick = () => cycleScore(btn, cat);
            grid.appendChild(btn);
        }
    });

    function openTab(catName) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => {
            b.classList.remove('active-vci', 'active-vsi', 'active-wmi');
        });
        document.getElementById(catName).classList.add('active');
        document.querySelector(`.tab-btn[onclick="openTab('${catName}')"]`).classList.add(`active-${catName}`);
    }

    function cycleScore(btn, cat) {
        let currentScore = parseInt(btn.getAttribute('data-score'));
        let nextScore = currentScore === 0 ? 2 : (currentScore === 2 ? 1 : 0);
        btn.setAttribute('data-score', nextScore);
        btn.querySelector('small').innerText = nextScore;
        calculateTotal(cat);
    }

    function calculateTotal(cat) {
        let total = 0;
        document.querySelectorAll(`#grid-${cat} .q-btn`).forEach(btn => total += parseInt(btn.getAttribute('data-score')));
        document.getElementById(`score-${cat}`).innerText = total;
    }

    // Timer
    let timers = { vci: null, vsi: null, wmi: null };
    let times = { vci: 0, vsi: 0, wmi: 0 };
    function toggleTimer(cat) {
        if (timers[cat]) { clearInterval(timers[cat]); timers[cat] = null; } 
        else { timers[cat] = setInterval(() => { times[cat]++; updateTimerDisplay(cat); }, 1000); }
    }
    function resetTimer(cat) { clearInterval(timers[cat]); timers[cat] = null; times[cat] = 0; updateTimerDisplay(cat); }
    function updateTimerDisplay(cat) {
        const m = Math.floor(times[cat] / 60).toString().padStart(2, '0');
        const s = (times[cat] % 60).toString().padStart(2, '0');
        document.getElementById(`timer-${cat}`).innerText = `${m}:${s}`;
    }

    // PDF 輸出
    function generatePDF() {
        document.getElementById('pdf-name').innerText = document.getElementById('studentName').value || "";
        document.getElementById('pdf-id').innerText = document.getElementById('examId').value || "";
        document.getElementById('pdf-date').innerText = new Date().toLocaleString('zh-TW', {hour12: false});

        categories.forEach(cat => {
            document.getElementById(`pdf-score-${cat}`).innerText = document.getElementById(`score-${cat}`).innerText;
            document.getElementById(`pdf-obs-${cat}`).innerText = document.getElementById(`obs-${cat}`).value || "";
        });

        const element = document.getElementById('pdf-template');
        element.style.display = 'block';

        const opt = {
            margin:       10, // 保持 10mm 邊距以防列印被裁切
            filename:     `${document.getElementById('studentName').value || '考生'}_評分表.pdf`,
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2 },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().from(element).set(opt).save().then(() => {
            element.style.display = 'none';
        });
    }
</script>

</body>
</html>
